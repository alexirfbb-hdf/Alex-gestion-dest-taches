<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alexandra · Gestion</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --sand:#F5F0E8;--sand-dark:#EDE6D6;--sand-deeper:#D9CEB8;
  --rose:#C4957A;--rose-pale:#F5EBE4;--rose-mid:#D4A892;--rose-deep:#A8705A;
  --sage:#8A9E8C;--sage-light:#B5C4B1;--sage-pale:#E8EEE7;
  --text:#3D3530;--text-mid:#7A6E68;--text-light:#9A8E88;--text-xlight:#C5B8B0;
  --white:#FDFAF5;
  --red:#C06060;--red-pale:#FAEAEA;
  --orange:#C49050;--orange-pale:#FDF3E3;
  --green:#6A9E6C;--green-pale:#EAF4EA;
  --r:14px;--r-sm:9px;
  --shadow:0 1px 4px rgba(61,53,48,0.07);
  --shadow-md:0 4px 16px rgba(61,53,48,0.10);
  --nav-h:60px;
  --sidebar-w:220px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--sand);font-family:'DM Sans',sans-serif;color:var(--text);height:100vh;overflow:hidden;font-size:13.5px;font-weight:300;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:var(--sand-deeper);border-radius:4px;}

/* ── LAYOUT ── */
.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;height:100vh;}

/* ── SIDEBAR ── */
.sidebar{background:var(--white);border-right:1px solid var(--sand-deeper);display:flex;flex-direction:column;overflow-y:auto;padding-bottom:var(--nav-h);}

/* DATE HERO */
.date-hero{padding:22px 18px 14px;border-bottom:1px solid var(--sand-dark);}
.day-name-lbl{font-size:9px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--text-xlight);margin-bottom:2px;}
.day-number{font-family:'Playfair Display',serif;font-size:42px;line-height:1;color:var(--text);}
.day-month-lbl{font-size:11px;color:var(--text-light);margin-top:2px;font-weight:300;}

/* MINI CAL */
.mini-cal-wrap{padding:14px 18px;border-bottom:1px solid var(--sand-dark);}
.mc-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.mc-mois{font-size:11px;font-weight:500;color:var(--text-light);}
.mc-nav{display:flex;gap:2px;}
.mc-nav button{width:20px;height:20px;border:none;background:none;cursor:pointer;font-size:13px;color:var(--text-xlight);border-radius:4px;display:flex;align-items:center;justify-content:center;}
.mc-nav button:hover{background:var(--sand);}
.mc-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}
.mc-head{font-size:7.5px;font-weight:500;text-transform:uppercase;color:var(--text-xlight);text-align:center;padding:2px 0;}
.mc-day{font-size:10px;text-align:center;padding:3px 1px;border-radius:4px;cursor:pointer;color:var(--text-light);line-height:1.4;position:relative;transition:background .12s;}
.mc-day:hover{background:var(--sand);}
.mc-day.other{color:var(--text-xlight);}
.mc-day.today{background:var(--text)!important;color:white!important;border-radius:50%;font-weight:600;}
.mc-day.sel:not(.today){background:var(--rose)!important;color:white!important;border-radius:50%;}
.mc-day.has-t::after{content:'';position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;background:var(--sage);}
.mc-day.today.has-t::after,.mc-day.sel.has-t::after{background:rgba(255,255,255,0.6);}

/* SEMAINE STRIP */
.week-strip-wrap{padding:12px 18px;border-bottom:1px solid var(--sand-dark);}
.ws-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.ws-col{text-align:center;cursor:pointer;}
.ws-name{font-size:7.5px;font-weight:500;text-transform:uppercase;color:var(--text-xlight);margin-bottom:3px;}
.ws-num{font-size:11.5px;color:var(--text-mid);width:22px;height:22px;display:flex;align-items:center;justify-content:center;margin:0 auto 3px;border-radius:50%;transition:all .15s;}
.ws-num.today{background:var(--text);color:white;}
.ws-num.sel:not(.today){background:var(--rose-pale);color:var(--rose);}
.ws-bar{height:3px;border-radius:2px;background:var(--sand-dark);overflow:hidden;margin:0 1px;}
.ws-bar-fill{height:100%;border-radius:2px;}
.ws-n{font-size:8px;color:var(--text-xlight);margin-top:2px;}

/* CATS SIDEBAR */
.cats-nav{flex:1;overflow-y:auto;padding:8px 0;}
.cat-nav-lbl{font-size:8.5px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--text-xlight);padding:10px 18px 4px;}
.cat-nav-item{display:flex;align-items:center;gap:8px;padding:7px 18px;cursor:pointer;transition:all .14s;border-left:2px solid transparent;}
.cat-nav-item:hover{background:var(--sand);}
.cat-nav-item.active{background:var(--rose-pale);border-left-color:var(--rose);}
.cat-nav-item.active .cni-name{color:var(--rose);font-weight:400;}
.cni-name{font-size:12.5px;color:var(--text-mid);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cni-n{font-size:10px;color:var(--text-xlight);}
.cni-prog{height:2px;background:var(--sand-deeper);margin:0 18px 3px;border-radius:2px;overflow:hidden;}
.cni-prog-fill{height:100%;background:var(--rose-mid);border-radius:2px;}

/* SIDEBAR BOTTOM */
.sidebar-bottom{padding:10px 18px;border-top:1px solid var(--sand-dark);}
.btn-sync{width:100%;background:none;border:1px solid var(--sand-deeper);border-radius:var(--r-sm);padding:7px;font-size:11.5px;font-family:'DM Sans',sans-serif;color:var(--text-light);cursor:pointer;transition:all .14s;}
.btn-sync:hover{border-color:var(--rose-mid);color:var(--rose);}

/* ── MAIN ── */
.main-wrap{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.main-content{flex:1;overflow-y:auto;padding:16px 20px calc(var(--nav-h) + 16px);}
.page{display:none;flex-direction:column;gap:12px;}
.page.active{display:flex;}

/* CARD */
.card{background:var(--white);border-radius:var(--r);padding:15px 18px;box-shadow:var(--shadow);}
.card-lbl{font-size:9px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--text-xlight);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}

/* FOCUS */
.focus-card{background:var(--rose-pale);border:1px solid var(--rose-mid);border-radius:var(--r);padding:15px 18px;}
.focus-lbl{font-size:9px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--rose);margin-bottom:10px;}
.fi{display:flex;align-items:center;gap:9px;background:white;border-radius:8px;padding:9px 12px;cursor:pointer;margin-bottom:6px;box-shadow:var(--shadow);}
.fi:last-child{margin-bottom:0;}
.fi.done-f{opacity:.45;}
.fi-chk{width:16px;height:16px;border:1.5px solid var(--sand-deeper);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;cursor:pointer;}
.fi-chk.done{background:var(--sage);border-color:var(--sage);color:white;}
.fi-titre{font-size:12.5px;flex:1;color:var(--text);font-weight:300;}
.fi.done-f .fi-titre{text-decoration:line-through;color:var(--text-light);}
.fi-cat{font-size:10px;color:var(--text-xlight);}
.focus-empty{text-align:center;padding:10px;color:var(--rose-mid);font-style:italic;font-size:11.5px;}
.btn-fp{background:none;border:1px solid var(--rose-mid);color:var(--rose);border-radius:20px;padding:4px 12px;font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:8px;display:block;}

/* AGENDA */
.ag-item{display:flex;align-items:baseline;gap:10px;padding:7px 0;border-bottom:1px solid var(--sand-dark);}
.ag-item:last-child{border-bottom:none;padding-bottom:0;}
.ag-time{font-size:11px;font-weight:500;color:var(--sage);min-width:65px;flex-shrink:0;}
.ag-body{flex:1;}
.ag-titre{font-size:13px;color:var(--text);line-height:1.3;}
.ag-lieu{font-size:10.5px;color:var(--text-light);}
.ag-empty{font-size:12px;color:var(--text-xlight);font-style:italic;padding:4px 0;}

/* TACHES */
.tasks-list{display:flex;flex-direction:column;gap:5px;}
.task-item{display:flex;align-items:flex-start;gap:9px;padding:10px 12px;border-radius:var(--r-sm);cursor:pointer;border-left:3px solid transparent;transition:box-shadow .14s;}
.task-item:hover{box-shadow:var(--shadow);}
.task-item.pr{background:var(--red-pale);border-left-color:var(--red);}
.task-item.po{background:var(--orange-pale);border-left-color:var(--orange);}
.task-item.pg{background:var(--green-pale);border-left-color:var(--green);}
.task-item.pn{background:var(--white);border-left-color:var(--sand-deeper);}
.t-chk{width:17px;height:17px;border-radius:50%;border:1.5px solid var(--sand-deeper);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;background:white;transition:all .18s;cursor:pointer;}
.t-chk:hover{border-color:var(--sage);}
.t-chk.done{background:var(--sage);border-color:var(--sage);}
.t-chk.done::after{content:'&#10003;';font-size:9px;color:white;font-weight:700;}
.t-body{flex:1;min-width:0;}
.t-titre{font-size:13px;color:var(--text);line-height:1.4;margin-bottom:2px;}
.task-item.done-t .t-titre{text-decoration:line-through;color:var(--text-xlight);}
.t-meta{display:flex;gap:4px;flex-wrap:wrap;}
.badge{font-size:10px;border-radius:4px;padding:1px 5px;}
.b-date{color:var(--text-light);}
.b-date.late{color:var(--red);}
.b-rec{color:var(--text-light);font-style:italic;}
.b-focus{background:var(--rose-pale);color:var(--rose);}
.t-actions{display:flex;gap:3px;opacity:0;transition:opacity .14s;}
.task-item:hover .t-actions{opacity:1;}
.btn-ta{background:none;border:1px solid var(--sand-dark);border-radius:4px;width:23px;height:23px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;color:var(--text-light);transition:all .14s;}
.btn-ta:hover{background:var(--sand);}
.btn-ta.danger:hover{background:var(--red-pale);color:var(--red);}
.btn-ta.pinned{color:var(--rose);background:var(--rose-pale);}

/* SECTION */
.sec-hdr{display:flex;align-items:center;gap:7px;margin-bottom:8px;cursor:pointer;}
.sec-arr{font-size:9px;color:var(--text-xlight);transition:transform .18s;}
.sec-arr.open{transform:rotate(90deg);}
.sec-title{font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text-xlight);}
.sec-n{font-size:10px;background:var(--sand-dark);border-radius:8px;padding:1px 6px;color:var(--text-mid);}
.sec-body.collapsed{display:none;}

/* QUICK ADD */
.add-card{background:var(--white);border-radius:var(--r);padding:13px 16px;box-shadow:var(--shadow);}
.add-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1.5px dashed var(--sand-deeper);border-radius:var(--r-sm);transition:all .18s;}
.add-row:focus-within{border-color:var(--rose-mid);}
.add-input{flex:1;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;}
.add-input::placeholder{color:var(--text-xlight);}
.add-meta{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap;}
.add-meta-lbl{font-size:11px;color:var(--text-xlight);}
.add-sel{border:1px solid var(--sand-deeper);border-radius:6px;padding:4px 7px;font-size:11.5px;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--white);outline:none;}
.pdot{width:18px;height:18px;border-radius:50%;cursor:pointer;transition:all .14s;flex-shrink:0;border:none;}
.pdot.r{background:var(--red);}
.pdot.o{background:var(--orange);}
.pdot.g{background:var(--green);}
.pdot{opacity:.4;}
.pdot.sel{opacity:1;box-shadow:0 0 0 2px white,0 0 0 3px currentColor;}
.pdot.r.sel{box-shadow:0 0 0 2px white,0 0 0 3px var(--red);}
.pdot.o.sel{box-shadow:0 0 0 2px white,0 0 0 3px var(--orange);}
.pdot.g.sel{box-shadow:0 0 0 2px white,0 0 0 3px var(--green);}
.btn-add{background:var(--text);color:white;border:none;border-radius:6px;padding:5px 14px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap;}

/* FILTRES */
.filtres{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.fp{background:none;border:1px solid var(--sand-deeper);border-radius:20px;padding:3px 11px;font-size:11.5px;font-family:'DM Sans',sans-serif;cursor:pointer;color:var(--text-mid);transition:all .14s;}
.fp.active{background:var(--rose);border-color:var(--rose);color:white;}

/* CAT CARD */
.cat-card{background:var(--white);border-radius:var(--r);padding:13px 16px;box-shadow:var(--shadow);margin-bottom:8px;}
.cat-card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.cat-card-name{font-size:14px;font-weight:400;color:var(--text);}
.cat-card-meta{font-size:10.5px;color:var(--text-xlight);}
.cat-prog{height:3px;background:var(--sand-deeper);border-radius:2px;overflow:hidden;margin-bottom:8px;}
.cat-prog-fill{height:100%;background:var(--rose-mid);border-radius:2px;}

/* NAV BAS */
.bottom-nav{position:fixed;bottom:0;left:var(--sidebar-w);right:0;height:var(--nav-h);background:var(--white);border-top:1px solid var(--sand-deeper);display:flex;align-items:center;justify-content:space-around;padding:0 8px;z-index:100;box-shadow:0 -1px 8px rgba(61,53,48,0.06);}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 14px;border:none;background:transparent;cursor:pointer;border-radius:var(--r-sm);}
.nav-btn .nb-icon{font-size:18px;line-height:1;}
.nav-btn .nb-lbl{font-size:9.5px;font-weight:500;letter-spacing:.04em;color:var(--text-xlight);font-family:'DM Sans',sans-serif;}
.nav-btn.active .nb-lbl{color:var(--rose);}
.nav-btn-add{width:44px;height:44px;background:var(--rose);border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(196,149,122,0.45);}
.nav-btn-add span{font-size:22px;color:white;line-height:1;}

/* MODALS */
.modal-bg{position:fixed;inset:0;background:rgba(61,53,48,0.3);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px);}
.modal-bg.hidden{display:none;}
.modal{background:var(--white);border-radius:var(--r) var(--r) 0 0;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;padding:20px 22px 36px;box-shadow:0 -4px 24px rgba(61,53,48,0.15);}
.modal-handle{width:32px;height:3px;background:var(--sand-deeper);border-radius:2px;margin:0 auto 18px;}
.modal-title{font-family:'Playfair Display',serif;font-size:19px;font-weight:400;color:var(--text);margin-bottom:18px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fg{margin-bottom:12px;}
.fl{font-size:9.5px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--text-light);margin-bottom:4px;display:block;}
.fc{width:100%;border:1px solid var(--sand-deeper);border-radius:var(--r-sm);padding:8px 11px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:300;color:var(--text);outline:none;background:var(--white);}
.fc:focus{border-color:var(--rose-mid);}
textarea.fc{resize:vertical;min-height:65px;}
.rec-det{margin-top:6px;display:none;}
.rec-det.show{display:block;}
.rec-days{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;}
.rec-day{border:1px solid var(--sand-deeper);border-radius:20px;padding:3px 9px;font-size:11px;cursor:pointer;color:var(--text-mid);background:var(--white);font-family:'DM Sans',sans-serif;}
.rec-day.active{background:var(--rose);border-color:var(--rose);color:white;}
.cl-item{display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:1px solid var(--sand-dark);}
.cl-item input[type=checkbox]{accent-color:var(--sage);width:13px;height:13px;cursor:pointer;}
.cl-item input[type=text]{flex:1;border:none;outline:none;font-size:12.5px;font-family:'DM Sans',sans-serif;font-weight:300;background:transparent;color:var(--text);}
.cl-item input[type=text].done-cl{text-decoration:line-through;color:var(--text-xlight);}
.btn-add-cl{background:none;border:1px dashed var(--sand-deeper);border-radius:var(--r-sm);padding:4px 11px;font-size:11px;font-family:'DM Sans',sans-serif;color:var(--text-light);cursor:pointer;margin-top:6px;}
.modal-footer{display:flex;gap:7px;justify-content:space-between;margin-top:18px;align-items:center;}
.mf-left{display:flex;gap:6px;}
.btn-del{background:none;border:1px solid var(--sand-deeper);border-radius:var(--r-sm);padding:6px 12px;font-size:11.5px;font-family:'DM Sans',sans-serif;color:var(--red);cursor:pointer;}
.btn-del:hover{background:var(--red-pale);border-color:var(--red);}
.btn-arch{background:none;border:1px solid var(--sand-deeper);border-radius:var(--r-sm);padding:6px 12px;font-size:11.5px;font-family:'DM Sans',sans-serif;color:var(--text-mid);cursor:pointer;}
.btn-cancel{background:none;border:1px solid var(--sand-deeper);border-radius:var(--r-sm);padding:6px 13px;font-size:11.5px;font-family:'DM Sans',sans-serif;color:var(--text-mid);cursor:pointer;}
.btn-save{background:var(--rose);color:white;border:none;border-radius:var(--r-sm);padding:6px 16px;font-size:11.5px;font-weight:400;font-family:'DM Sans',sans-serif;cursor:pointer;}

/* CONFIRM */
.confirm-bg{position:fixed;inset:0;background:rgba(61,53,48,0.35);z-index:300;display:flex;align-items:center;justify-content:center;}
.confirm-bg.hidden{display:none;}
.confirm-box{background:var(--white);border-radius:var(--r);padding:22px 26px;width:290px;box-shadow:0 8px 32px rgba(61,53,48,0.2);text-align:center;}
.confirm-box p{font-family:'Playfair Display',serif;font-size:14px;margin-bottom:14px;color:var(--text);}
.confirm-btns{display:flex;gap:7px;justify-content:center;}

/* FP PICKER */
.fp-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--sand-dark);cursor:pointer;}
.fp-item:last-child{border-bottom:none;}
.fp-cat{font-size:10.5px;color:var(--text-light);min-width:90px;flex-shrink:0;}
.fp-titre{font-size:12.5px;color:var(--text);}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--nav-h) + 10px);left:calc(var(--sidebar-w) + 50%);transform:translateX(-50%) translateY(16px);background:var(--text);color:var(--white);padding:9px 18px;border-radius:20px;font-size:12px;box-shadow:0 4px 16px rgba(61,53,48,0.2);z-index:400;opacity:0;transition:all .22s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.err{background:var(--red);}

.loading{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;padding:40px;color:var(--text-light);font-style:italic;font-size:12.5px;}
.spinner{width:22px;height:22px;border:2px solid var(--sand-deeper);border-top-color:var(--rose-mid);border-radius:50%;animation:spin .9s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:24px;color:var(--text-xlight);font-style:italic;font-size:12px;}
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR GAUCHE -->
  <div class="sidebar">
    <div class="date-hero">
      <div class="day-name-lbl" id="dayName"></div>
      <div class="day-number" id="dayNum"></div>
      <div class="day-month-lbl" id="dayMonth"></div>
    </div>

    <div class="mini-cal-wrap">
      <div id="miniCal"></div>
    </div>

    <div class="week-strip-wrap">
      <div class="ws-grid" id="weekStrip"></div>
    </div>

    <div class="cats-nav">
      <div class="cat-nav-lbl">Categories</div>
      <div id="catsNav"></div>
    </div>

    <div class="sidebar-bottom">
      <button class="btn-sync" onclick="syncAll()">&#8635; Actualiser</button>
    </div>
  </div>

  <!-- CONTENU PRINCIPAL -->
  <div class="main-wrap">
    <div class="main-content" id="mainContent">

      <!-- PAGE AUJOURD'HUI -->
      <div class="page active" id="page-aujourdhui">
        <div class="focus-card">
          <div class="focus-lbl">&#11088; Focus du jour</div>
          <div id="focusItems"></div>
          <button class="btn-fp" onclick="showFP()">+ Epingler une priorite</button>
        </div>
        <div class="card">
          <div class="card-lbl">&#128197; Agenda <span id="agDateLbl" style="color:var(--text-xlight);letter-spacing:0;text-transform:none;font-size:10.5px;font-weight:300"></span></div>
          <div id="agendaList"><div class="ag-empty">Chargement...</div></div>
        </div>
        <div class="card">
          <div class="sec-hdr" onclick="toggleSec(this)">

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz3gYGJiCw7N6CjFBklWijlWyuKfL0YcTOAlNU30iZe5NgM1cOSqH86rHDJPZbpfJ1P/exec';

let tasks = [], cats = [], selDate = new Date(), calDate = new Date();
let editRow = null, clData = [], recJours = [], qPrio = '', filtreStatut = 'active', currentCat = null;

// ── UTILS ─────────────────────────────────────────────────
function parseDate(s) {
  if (!s) return '';
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  try { var d = new Date(s); if (!isNaN(d.getTime())) return d.toISOString().substring(0,10); } catch(e2) {}
  return '';
}

function cleanCat(s) {
  if (!s) return 'Autre';
  return s.replace(/[\u{1F000}-\u{1FFFF}\u{2600}-\u{27FF}\u{2B00}-\u{2BFF}]/gu, '').replace(/\s+/g,' ').trim() || 'Autre';
}

function todayStr() { return new Date().toISOString().substring(0,10); }

function relDate(s) {
  if (!s) return '';
  var t = new Date(); t.setHours(0,0,0,0);
  var d = new Date(s + 'T00:00:00');
  var diff = Math.round((d - t) / 86400000);
  if (diff === 0) return 'Auj.';
  if (diff === -1) return 'Hier';
  if (diff === 1) return 'Demain';
  if (diff < 0) return Math.abs(diff) + 'j retard';
  if (diff <= 7) return 'Dans ' + diff + 'j';
  var m = ['jan','fev','mar','avr','mai','jun','jul','aou','sep','oct','nov','dec'];
  return d.getDate() + ' ' + m[d.getMonth()];
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/`/g,'&#96;');
}

function prioClass(p) {
  if (p === 'haute') return 'pr';
  if (p === 'moyenne') return 'po';
  if (p === 'basse') return 'pg';
  return 'pn';
}

function recLabel(t) {
  var map = {quotidien:'Chaque jour', joursOuvrables:'Lun-Ven', annee:'Annuel'};
  if (map[t.recurrence]) return map[t.recurrence];
  if (t.recurrence === 'semaine') {
    var j = []; try { j = JSON.parse(t.recurrence_detail || '[]'); } catch(e3) {}
    var jN = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
    return j.length ? j.map(function(x){return jN[x];}).join(',') : 'Hebdo';
  }
  if (t.recurrence === 'mois') return 'Le ' + (t.recurrence_detail || '?');
  return '';
}

// ── INIT ──────────────────────────────────────────────────
function init() {
  fetch(SCRIPT_URL)
    .then(function(r) { return r.json(); })
    .then(function(json) {
      if (json.error) throw new Error(json.error);
      tasks = json.tasks.map(function(t) {
        return Object.assign({}, t, {
          date_echeance: parseDate(t.date_echeance),
          created: parseDate(t.created),
          liste: cleanCat(t.liste),
          _row: parseInt(t._row) || 0
        });
      });
      var allCats = [];
      tasks.forEach(function(t) { if (t.liste && allCats.indexOf(t.liste) === -1) allCats.push(t.liste); });
      allCats.sort();
      var saved = localStorage.getItem('irfbb_cats');
      if (saved) {
        var s = JSON.parse(saved);
        cats = s.filter(function(c){return allCats.indexOf(c) >= 0;}).concat(allCats.filter(function(c){return s.indexOf(c) < 0;}));
      } else {
        cats = allCats;
      }
      renderAll();
      loadAgenda();
    })
    .catch(function(e) {
      document.getElementById('taches-list').innerHTML = '<div class="empty">Erreur: ' + esc(e.message) + '<br><br><button class="btn-save" onclick="init()">Reessayer</button></div>';
      showToast('Erreur chargement', true);
    });
}

function syncAll() { init(); showToast('Actualisation...'); }

// ── RENDER ────────────────────────────────────────────────
function renderAll() {
  renderDateHero();
  renderMiniCal();
  renderWeekStrip();
  renderCatsNav();
  renderFocus();
  renderTodayTasks();
  renderTachesList();
  renderWeekTasks();
  renderCatCards();
  populateSelects();
}

// ── DATE HERO ─────────────────────────────────────────────
function renderDateHero() {
  var jN = ['DIMANCHE','LUNDI','MARDI','MERCREDI','JEUDI','VENDREDI','SAMEDI'];
  var mN = ['janvier','fevrier','mars','avril','mai','juin','juillet','aout','septembre','octobre','novembre','decembre'];
  var d = selDate;
  document.getElementById('dayName').textContent = jN[d.getDay()];
  document.getElementById('dayNum').textContent = d.getDate();
  document.getElementById('dayMonth').textContent = mN[d.getMonth()] + ' ' + d.getFullYear();
  document.getElementById('agDateLbl').textContent = '- ' + d.getDate() + ' ' + mN[d.getMonth()];
}

// ── MINI CAL ──────────────────────────────────────────────
function renderMiniCal() {
  var today = new Date(); today.setHours(0,0,0,0);
  var y = calDate.getFullYear(), m = calDate.getMonth();
  var mN = ['Jan','Fev','Mar','Avr','Mai','Jun','Jul','Aou','Sep','Oct','Nov','Dec'];
  var first = new Date(y, m, 1);
  var startDow = first.getDay(); if (startDow === 0) startDow = 7;
  var lastDay = new Date(y, m+1, 0).getDate();
  var selDs = selDate.toISOString().substring(0,10);
  var h = '<div class="mc-hdr"><span class="mc-mois">' + mN[m] + ' ' + y + '</span><div class="mc-nav"><button onclick="calPrev()">&#8249;</button><button onclick="calNext()">&#8250;</button></div></div>';
  h += '<div class="mc-grid">';
  ['L','M','M','J','V','S','D'].forEach(function(x){h+='<span class="mc-head">'+x+'</span>';});
  for (var i = 1; i < startDow; i++) h += '<span class="mc-day other"></span>';
  for (var d2 = 1; d2 <= lastDay; d2++) {
    var dt = new Date(y, m, d2); dt.setHours(0,0,0,0);
    var ds = dt.toISOString().substring(0,10);
    var isT = dt.getTime() === today.getTime();
    var isSel = ds === selDs;
    var n = tasks.filter(function(t){return t.date_echeance === ds && t.statut !== 'terminee' && t.statut !== 'archivee';}).length;
    h += '<span class="mc-day' + (isT?' today':'') + (isSel&&!isT?' sel':'') + (n>0?' has-t':'') + '" onclick="goDate('+y+','+m+','+d2+')">' + d2 + '</span>';
  }
  h += '</div>';
  document.getElementById('miniCal').innerHTML = h;
}

function calPrev() { calDate.setMonth(calDate.getMonth()-1); renderMiniCal(); }
function calNext() { calDate.setMonth(calDate.getMonth()+1); renderMiniCal(); }
function goDate(y,m,d) { selDate = new Date(y,m,d); renderDateHero(); renderMiniCal(); renderWeekStrip(); renderTodayTasks(); loadAgenda(); }

// ── WEEK STRIP ────────────────────────────────────────────
function renderWeekStrip() {
  var today = new Date(); today.setHours(0,0,0,0);
  var days = [], d = new Date(today), dow = d.getDay();
  d.setDate(d.getDate() + (dow===0?-6:1-dow));
  for (var i=0;i<7;i++){days.push(new Date(d));d.setDate(d.getDate()+1);}
  var jN = ['L','M','M','J','V','S','D'];
  var selDs = selDate.toISOString().substring(0,10);
  document.getElementById('weekStrip').innerHTML = days.map(function(day,i){
    var ds = day.toISOString().substring(0,10);
    var n = tasks.filter(function(t){return t.date_echeance===ds&&t.statut!=='terminee'&&t.statut!=='archivee';}).length;
    var isT = day.getTime()===today.getTime();
    var isSel = ds===selDs;
    var pct = Math.min(100,n*20);
    var col = n===0?'var(--sand-deeper)':n<=2?'var(--sage)':n<=4?'var(--orange)':'var(--red)';
    return '<div class="ws-col" onclick="goDate('+day.getFullYear()+','+day.getMonth()+','+day.getDate()+')">' +
      '<div class="ws-name">'+jN[i]+'</div>' +
      '<div class="ws-num'+(isT?' today':'')+(isSel&&!isT?' sel':'')+'">'+day.getDate()+'</div>' +
      '<div class="ws-bar"><div class="ws-bar-fill" style="width:'+pct+'%;background:'+col+'"></div></div>' +
      '<div class="ws-n">'+(n||'')+'</div></div>';
  }).join('');
}

// ── CATS NAV ──────────────────────────────────────────────
function renderCatsNav() {
  document.getElementById('catsNav').innerHTML = cats.map(function(cat){
    var base = tasks.filter(function(t){return t.liste===cat&&t.statut!=='archivee';});
    var done = base.filter(function(t){return t.statut==='terminee';}).length;
    var act  = base.filter(function(t){return t.statut!=='terminee';}).length;
    var pct  = base.length ? Math.round(done/base.length*100) : 0;
    var isA  = currentCat === cat;
    return '<div class="cat-nav-item'+(isA?' active':'')+'" onclick="selectCat(\''+esc(cat)+'\')">' +
      '<span class="cni-name">'+esc(cat)+'</span>' +
      '<span class="cni-n">'+act+'</span>' +
      '</div>' +
      (isA?'<div class="cni-prog"><div class="cni-prog-fill" style="width:'+pct+'%"></div></div>':'');
  }).join('');
}

function selectCat(cat) {
  currentCat = currentCat === cat ? null : cat;
  renderCatsNav();
  if (currentCat) {
    showPage('taches');
    renderTachesList();
  }
}

// ── FOCUS ─────────────────────────────────────────────────
function renderFocus() {
  var ft = tasks.filter(function(t){return t.focus==='oui'&&t.statut!=='archivee';}).slice(0,3);
  var el = document.getElementById('focusItems');
  if (!ft.length) { el.innerHTML = '<div class="focus-empty">Choisissez vos 3 priorites du jour</div>'; return; }
  el.innerHTML = ft.map(function(t){
    return '<div class="fi'+(t.statut==='terminee'?' done-f':'')+'" onclick="openModal('+t._row+')">' +
      '<div class="fi-chk'+(t.statut==='terminee'?' done':'')+'" onclick="toggleCheck(event,'+t._row+')">'+(t.statut==='terminee'?'&#10003;':'')+'</div>' +
      '<span class="fi-titre">'+esc(t.titre)+'</span>' +
      '<span class="fi-cat">'+esc(t.liste)+'</span>' +
      '</div>';
  }).join('');
}

function showFP() {
  var avail = tasks.filter(function(t){return t.statut!=='terminee'&&t.statut!=='archivee'&&t.focus!=='oui';});
  document.getElementById('fpList').innerHTML = avail.slice(0,30).map(function(t){
    return '<div class="fp-item" onclick="pinFocus('+t._row+')">' +
      '<span class="fp-cat">'+esc(t.liste)+'</span>' +
      '<span class="fp-titre">'+esc(t.titre)+'</span></div>';
  }).join('') || '<div class="empty">Toutes epinglees.</div>';
  document.getElementById('fpBg').classList.remove('hidden');
}

function pinFocus(row) {
  var t = tasks.find(function(t){return t._row===row;}); if(!t)return;
  if (tasks.filter(function(t){return t.focus==='oui'&&t.statut!=='archivee';}).length >= 3) { showToast('Max 3 en focus',true); return; }
  t.focus = 'oui'; saveRow(t); closeFP(); renderFocus(); showToast('Epingle!');
}
function closeFP() { document.getElementById('fpBg').classList.add('hidden'); }
function closeFPBg(e) { if(e.target===document.getElementById('fpBg'))closeFP(); }

// ── AGENDA ────────────────────────────────────────────────
function loadAgenda() {
  var el = document.getElementById('agendaList');
  el.innerHTML = '<div class="ag-empty">Chargement...</div>';
  var ds = selDate.toISOString().substring(0,10);
  fetch(SCRIPT_URL + '?action=agenda&date=' + ds)
    .then(function(r){return r.json();})
    .then(function(json){
      if (!json.events || !json.events.length) { el.innerHTML='<div class="ag-empty">Aucun evenement</div>'; return; }
      el.innerHTML = json.events.map(function(ev){
        return '<div class="ag-item">' +
          '<span class="ag-time">'+(ev.allDay?'Journee':ev.start+(ev.end?' - '+ev.end:''))+'</span>' +
          '<div class="ag-body"><div class="ag-titre">'+esc(ev.summary)+'</div>'+(ev.location?'<div class="ag-lieu">'+esc(ev.location)+'</div>':'')+'</div>' +
          '</div>';
      }).join('');
    })
    .catch(function(){ el.innerHTML='<div class="ag-empty">Agenda non disponible</div>'; });
}

// ── TACHES DU JOUR ────────────────────────────────────────
function renderTodayTasks() {
  var ds = selDate.toISOString().substring(0,10);
  var today = todayStr();
  var dayT = tasks.filter(function(t){return t.date_echeance===ds&&t.statut!=='archivee'&&t.statut!=='terminee';});
  var overdueT = tasks.filter(function(t){return t.date_echeance&&t.date_echeance<today&&t.date_echeance!==ds&&t.statut!=='archivee'&&t.statut!=='terminee';});
  var urg = dayT.filter(function(t){return t.priorite==='haute';}).concat(overdueT.filter(function(t){return t.priorite==='haute';}));
  var aut = dayT.filter(function(t){return t.priorite!=='haute';}).concat(overdueT.filter(function(t){return t.priorite!=='haute';}));
  document.getElementById('n-urg').textContent = urg.length;
  document.getElementById('n-aut').textContent = aut.length;
  document.getElementById('tasks-urg').innerHTML = urg.length ? urg.map(function(t){return taskHTML(t);}).join('') : '<div class="empty">Aucune urgence</div>';
  document.getElementById('tasks-aut').innerHTML = aut.length ? aut.map(function(t){return taskHTML(t);}).join('') : '<div class="empty">Rien d\'autre !</div>';
}

// ── PAGE TACHES ───────────────────────────────────────────
function renderTachesList() {
  var list = tasks.filter(function(t){return t.statut!=='archivee';});
  if (filtreStatut === 'active') list = list.filter(function(t){return t.statut!=='terminee';});
  else if (filtreStatut === 'terminee') list = list.filter(function(t){return t.statut==='terminee';});
  if (currentCat) list = list.filter(function(t){return t.liste===currentCat;});
  var grouped = {};
  list.forEach(function(t){if(!grouped[t.liste])grouped[t.liste]=[];grouped[t.liste].push(t);});
  var order = currentCat ? [currentCat] : cats.filter(function(c){return grouped[c]&&grouped[c].length;});
  document.getElementById('taches-list').innerHTML = order.map(function(cat){
    return '<div class="card" style="margin-bottom:8px">' +
      '<div class="sec-hdr" onclick="toggleSec(this)">' +
      '<span class="sec-arr open">&#9658;</span>' +
      '<span class="sec-title">'+esc(cat)+'</span>' +
      '<span class="sec-n">'+(grouped[cat]?grouped[cat].length:0)+'</span>' +
      '</div>' +
      '<div class="sec-body tasks-list">'+(grouped[cat]?grouped[cat].map(function(t){return taskHTML(t);}).join(''):'')+'</div>' +
      '</div>';
  }).join('') || '<div class="empty">Aucune tache.</div>';
}

// ── PAGE SEMAINE ──────────────────────────────────────────
function renderWeekTasks() {
  var today = new Date(); today.setHours(0,0,0,0);
  var days = [], d = new Date(today), dow = d.getDay();
  d.setDate(d.getDate()+(dow===0?-6:1-dow));
  for(var i=0;i<7;i++){days.push(new Date(d));d.setDate(d.getDate()+1);}
  var jF = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  var html = days.map(function(day,i){
    var ds = day.toISOString().substring(0,10);
    var dt = tasks.filter(function(t){return t.date_echeance===ds&&t.statut!=='archivee';});
    if (!dt.length) return '';
    var isT = day.getTime()===today.getTime();
    return '<div style="margin-bottom:12px">' +
      '<div style="font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:'+(isT?'var(--rose)':'var(--text-xlight)')+';margin-bottom:6px">'+jF[i]+' '+day.getDate()+'</div>' +
      '<div class="tasks-list">'+dt.map(function(t){return taskHTML(t);}).join('')+'</div></div>';
  }).join('');
  document.getElementById('weekTasksList').innerHTML = html || '<div class="empty">Aucune tache cette semaine</div>';
}

// ── PAGE CATEGORIES ───────────────────────────────────────
function renderCatCards() {
  document.getElementById('catCards').innerHTML = cats.map(function(cat){
    var base = tasks.filter(function(t){return t.liste===cat&&t.statut!=='archivee';});
    var done = base.filter(function(t){return t.statut==='terminee';}).length;
    var act  = base.filter(function(t){return t.statut!=='terminee';}).length;
    var pct  = base.length ? Math.round(done/base.length*100) : 0;
    var preview = base.filter(function(t){return t.statut!=='terminee';}).slice(0,3);
    return '<div class="cat-card">' +
      '<div class="cat-card-hdr"><span class="cat-card-name">'+esc(cat)+'</span><span class="cat-card-meta">'+act+' active'+(act>1?'s':'')+' &middot; '+pct+'%</span></div>' +
      '<div class="cat-prog"><div class="cat-prog-fill" style="width:'+pct+'%"></div></div>' +
      '<div class="tasks-list">'+preview.map(function(t){return taskHTML(t);}).join('')+'</div>' +
      (act>3?'<div style="margin-top:6px;text-align:center"><a href="#" onclick="selectCat(\''+esc(cat)+'\');showPage(\'taches\');return false" style="font-size:11px;color:var(--text-light);text-decoration:none">Voir toutes &#8594;</a></div>':'') +
      '</div>';
  }).join('') || '<div class="empty">Aucune categorie.</div>';
}

// ── TASK HTML ─────────────────────────────────────────────
function taskHTML(t) {
  var today = todayStr();
  var overdue = t.date_echeance && t.date_echeance < today && t.statut !== 'terminee';
  var done = t.statut === 'terminee';
  var pc = prioClass(t.priorite || '');
  var row = typeof t._row === 'number' ? t._row : 0;
  var dateB = t.date_echeance ? '<span class="badge b-date'+(overdue?' late':'')+'">'+relDate(t.date_echeance)+'</span>' : '';
  var recB  = t.recurrence ? '<span class="badge b-rec">&#8635; '+esc(recLabel(t))+'</span>' : '';
  var focB  = t.focus==='oui' ? '<span class="badge b-focus">&#11088;</span>' : '';
  return '<div class="task-item '+pc+(done?' done-t':'')+'" onclick="openModal('+row+')">' +
    '<div class="t-chk'+(done?' done':'')+'" onclick="toggleCheck(event,'+row+')"></div>' +
    '<div class="t-body">' +
    '<div class="t-titre">'+esc(t.titre)+'</div>' +
    '<div class="t-meta">'+dateB+recB+focB+'</div>' +
    '</div>' +
    '<div class="t-actions">' +
    '<button class="btn-ta'+(t.focus==='oui'?' pinned':'')+'" onclick="togglePin(event,'+row+')" title="Focus">&#11088;</button>' +
    '<button class="btn-ta" onclick="openModal('+row+')">&#9998;</button>' +
    '<button class="btn-ta danger" onclick="doSuppr(event,'+row+')">&#10005;</button>' +
    '</div></div>';
}

// ── ACTIONS ───────────────────────────────────────────────
function toggleCheck(e, row) {
  e.stopPropagation();
  var t = tasks.find(function(t){return t._row===row;}); if(!t)return;
  var was = t.statut !== 'terminee';
  t.statut = was ? 'terminee' : 'active';
  if (was && t.recurrence) {
    var next = nextOcc(t);
    if (next) {
      var nt = Object.assign({}, t, {_row:tasks.length+300+Math.random(), id:'rec_'+Date.now(), date_echeance:next, statut:'active', created:todayStr()});
      tasks.push(nt); appendRow(nt);
    }
  }
  if (was && t.focus==='oui') t.focus = '';
  saveRow(t); renderAll();
}

function togglePin(e, row) {
  e.stopPropagation();
  var t = tasks.find(function(t){return t._row===row;}); if(!t)return;
  if (t.focus!=='oui' && tasks.filter(function(t){return t.focus==='oui'&&t.statut!=='archivee';}).length>=3) { showToast('Max 3 en focus',true); return; }
  t.focus = t.focus==='oui'?'':'oui';
  saveRow(t); renderAll();
}

function doSuppr(e, row, cb) {
  if(e)e.stopPropagation();
  showConfirm('Supprimer cette tache ?', function(){
    tasks = tasks.filter(function(t){return t._row!==row;});
    deleteRow(row); if(cb)cb(); renderAll(); showToast('Supprimee');
  });
}

// ── QUICK ADD ─────────────────────────────────────────────
var qPrioMap = {r:'haute', o:'moyenne', g:'basse'};

function setQP(p) {
  qPrio = qPrio===p ? '' : p;
  ['r','o','g'].forEach(function(x){
    var el = document.getElementById('pd-'+x); if(el) el.classList.toggle('sel', x===qPrio);
  });
}

function quickAdd() {
  var inp = document.getElementById('qaInput'); if(!inp)return;
  var titre = inp.value.trim(); if(!titre)return;
  var liste = (document.getElementById('qaCat')||{}).value || (cats[0]||'Autre');
  var prio  = qPrioMap[qPrio] || '';
  var nt = {id:'local_'+Date.now(), liste:liste, titre:titre, notes:'', date_echeance:'', statut:'active', priorite:prio, recurrence:'', recurrence_detail:'', focus:'', checklist:'', created:todayStr(), _row:tasks.length+200};
  tasks.push(nt); appendRow(nt);
  inp.value=''; qPrio='';
  ['r','o','g'].forEach(function(x){var el=document.getElementById('pd-'+x);if(el)el.classList.remove('sel');});
  renderAll(); showToast('Tache ajoutee!');
}

function populateSelects() {
  var opts = cats.map(function(c){return '<option value="'+esc(c)+'">'+esc(c)+'</option>';}).join('');
  ['fCat','qaCat'].forEach(function(id){var el=document.getElementById(id);if(el)el.innerHTML=opts;});
}

// ── MODAL ─────────────────────────────────────────────────
function openModal(row, lf) {
  editRow = row; var isNew = row === null;
  var t = isNew ? null : tasks.find(function(t){return t._row===row;});
  document.getElementById('mTitle').textContent = isNew ? 'Nouvelle tache' : 'Modifier';
  document.getElementById('btnDel').style.display = isNew?'none':'';
  document.getElementById('btnArch').style.display = isNew?'none':'';
  populateSelects();
  if (t) document.getElementById('fCat').value = t.liste || '';
  if (lf) document.getElementById('fCat').value = lf;
  document.getElementById('fTitre').value  = t ? t.titre  : '';
  document.getElementById('fPrio').value   = t ? (t.priorite||'') : '';
  document.getElementById('fDate').value   = t ? (t.date_echeance||'') : '';
  document.getElementById('fFocus').value  = t ? (t.focus||'') : '';
  document.getElementById('fRec').value    = t ? (t.recurrence||'') : '';
  document.getElementById('fNotes').value  = t ? (t.notes||'') : '';
  recJours = [];
  if (t && t.recurrence==='semaine') { try{recJours=JSON.parse(t.recurrence_detail||'[]');}catch(e4){} }
  document.querySelectorAll('.rec-day').forEach(function(b){b.classList.toggle('active',recJours.indexOf(parseInt(b.dataset.j))>=0);});
  var fRJ = document.getElementById('fRecJ');
  if (fRJ) fRJ.value = (t&&t.recurrence==='mois') ? (t.recurrence_detail||'') : '';
  updRec();
  clData = [];
  if (t && t.checklist) { try{clData=JSON.parse(t.checklist);}catch(e5){} }
  renderCl();
  document.getElementById('modalBg').classList.remove('hidden');
  setTimeout(function(){document.getElementById('fTitre').focus();}, 50);
}

function renderCl() {
  document.getElementById('clItems').innerHTML = clData.map(function(it,i){
    return '<div class="cl-item"><input type="checkbox"'+(it.done?' checked':'')+' onchange="clData['+i+'].done=this.checked;renderCl()">' +
      '<input type="text" value="'+esc(it.text)+'"'+(it.done?' class="done-cl"':'')+' oninput="clData['+i+'].text=this.value" onkeydown="if(event.key===\'Enter\'){addCl();event.preventDefault()}"></div>';
  }).join('');
}

function addCl() {
  clData.push({text:'',done:false}); renderCl();
  setTimeout(function(){var els=document.querySelectorAll('.cl-item input[type=text]');if(els.length)els[els.length-1].focus();},40);
}

function updRec() {
  var v = document.getElementById('fRec').value;
  document.getElementById('rdJ').classList.toggle('show', v==='semaine');
  document.getElementById('rdM').classList.toggle('show', v==='mois');
}

document.addEventListener('click', function(e) {
  if (e.target.classList.contains('rec-day')) {
    e.target.classList.toggle('active');
    var j = parseInt(e.target.dataset.j);
    var idx = recJours.indexOf(j);
    if (idx>=0) recJours.splice(idx,1); else recJours.push(j);
  }
});

function saveTask() {
  var titre = document.getElementById('fTitre').value.trim();
  if (!titre) { showToast('Titre requis',true); return; }
  var isNew = editRow === null; var t;
  if (isNew) { t={id:'local_'+Date.now(),_row:tasks.length+200,statut:'active',created:todayStr()}; tasks.push(t); }
  else { t=tasks.find(function(t){return t._row===editRow;}); if(!t)return; }
  t.titre   = titre;
  t.liste   = document.getElementById('fCat').value;
  t.priorite= document.getElementById('fPrio').value;
  t.date_echeance = document.getElementById('fDate').value;
  t.focus   = document.getElementById('fFocus').value;
  t.recurrence = document.getElementById('fRec').value;
  t.recurrence_detail = t.recurrence==='semaine' ? JSON.stringify(recJours) : t.recurrence==='mois' ? (document.getElementById('fRecJ').value||'') : '';
  t.notes   = document.getElementById('fNotes').value.trim();
  t.checklist = clData.length ? JSON.stringify(clData) : '';
  if (isNew) appendRow(t); else saveRow(t);
  closeModal(); renderAll(); showToast(isNew?'Creee!':'Mis a jour!');
}

function archTask() {
  var t=tasks.find(function(t){return t._row===editRow;}); if(!t)return;
  t.statut='archivee'; t.focus=''; saveRow(t); closeModal(); renderAll(); showToast('Archivee');
}
function suppTask() { doSuppr(null, editRow, closeModal); }
function closeModal() { document.getElementById('modalBg').classList.add('hidden'); editRow=null; }
function closeMBg(e) { if(e.target===document.getElementById('modalBg'))closeModal(); }

// ── NAVIGATION ────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});
  var p=document.getElementById('page-'+name); if(p)p.classList.add('active');
  var nb=document.getElementById('nav-'+name); if(nb)nb.classList.add('active');
  if(name==='taches')renderTachesList();
  if(name==='semaine')renderWeekTasks();
  if(name==='categories')renderCatCards();
  if(name==='aujourdhui')renderTodayTasks();
  document.getElementById('mainContent').scrollTop=0;
}

function setFS(s) {
  filtreStatut=s;
  ['active','terminee','toutes'].forEach(function(x){
    var el=document.getElementById('f-'+x); if(el)el.classList.toggle('active',x===s);
  });
  renderTachesList();
}

function toggleSec(hdr) {
  hdr.querySelector('.sec-arr').classList.toggle('open');
  var body=hdr.nextElementSibling; if(body)body.classList.toggle('collapsed');
}

// ── RECURRENCES ───────────────────────────────────────────
function nextOcc(t) {
  var r=t.recurrence; if(!r||!t.date_echeance)return null;
  var d=new Date(t.date_echeance+'T00:00:00');
  if(r==='quotidien'){d.setDate(d.getDate()+1);return d.toISOString().substring(0,10);}
  if(r==='joursOuvrables'){do{d.setDate(d.getDate()+1);}while([0,6].indexOf(d.getDay())>=0);return d.toISOString().substring(0,10);}
  if(r==='annee'){d.setFullYear(d.getFullYear()+1);return d.toISOString().substring(0,10);}
  if(r==='mois'){var j=parseInt(t.recurrence_detail)||d.getDate();d.setMonth(d.getMonth()+1);d.setDate(j);return d.toISOString().substring(0,10);}
  if(r==='semaine'){var js=[];try{js=JSON.parse(t.recurrence_detail||'[]');}catch(e6){}
    if(!js.length){d.setDate(d.getDate()+7);return d.toISOString().substring(0,10);}
    for(var i=1;i<=7;i++){var nd=new Date(d);nd.setDate(nd.getDate()+i);if(js.indexOf(nd.getDay())>=0)return nd.toISOString().substring(0,10);}
  }
  return null;
}

// ── API ───────────────────────────────────────────────────
function saveRow(t) {
  if(t._virtual)return;
  fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'update',rowIndex:t._row,task:t})}).catch(function(){});
}
function appendRow(t) {
  fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'append',task:t})}).catch(function(){});
}
function deleteRow(row) {
  if(typeof row!=='number'||row<2)return;
  fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'delete',rowIndex:row})}).catch(function(){});
}

// ── CONFIRM ───────────────────────────────────────────────
function showConfirm(msg,cb){document.getElementById('confirmMsg').textContent=msg;document.getElementById('confirmBg').classList.remove('hidden');document.getElementById('confirmOk').onclick=function(){closeConfirm();cb();};}
function closeConfirm(){document.getElementById('confirmBg').classList.add('hidden');}

// ── TOAST ─────────────────────────────────────────────────
function showToast(msg,err){var t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(err?' err':'');setTimeout(function(){t.className='toast';},3000);}

// ── START ─────────────────────────────────────────────────
init();
</script>
